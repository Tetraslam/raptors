<!DOCTYPE html>
<html>
<head>
    <title>Vulnerability Report</title>
</head>
<body>
    <h1>Vulnerability Report</h1>
    <h2>Summary</h2>
    <ul>
        {% for port, vulns in vulnerabilities.items() %}
            <li>Port {{ port }}:
                <ul>
                    {% for vuln in vulns %}
                        <li>{{ vuln }}</li>
                    {% endfor %}
                </ul>
            </li>
        {% endfor %}
    </ul>
</body>
</html>
